apiVersion: langbot/v1
kind: Plugin
metadata:
  author: langbot
  name: local-agent
  label:
    en_US: Local Agent
    zh_Hans: 内置 Agent
  description:
    en_US: Built-in agent with model fallback, tools, and knowledge retrieval.
    zh_Hans: 内置 Agent，支持模型 fallback、工具调用和知识库检索。
  icon: assets/icon.svg
spec:
  version: 0.1.0
  config: []
  components:
    AgentRunner:
      fromDirs:
        - path: components/agent_runner/
  pages: []
execution:
  python:
    path: main.py
    attr: LocalAgentPlugin
