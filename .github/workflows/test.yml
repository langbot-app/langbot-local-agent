name: Test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout local agent
        uses: actions/checkout@v4
        with:
          path: langbot-local-agent

      - name: Checkout plugin SDK
        uses: actions/checkout@v4
        with:
          repository: langbot-app/langbot-plugin-sdk
          path: langbot-plugin-sdk

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --dev
        working-directory: langbot-local-agent

      - name: Ruff check
        run: uv run ruff check .
        working-directory: langbot-local-agent

      - name: Ruff format check
        run: uv run ruff format --check .
        working-directory: langbot-local-agent

      - name: Pytest
        run: uv run pytest
        working-directory: langbot-local-agent
