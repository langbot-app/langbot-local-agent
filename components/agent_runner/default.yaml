apiVersion: langbot/v1
kind: AgentRunner
metadata:
  name: default
  label:
    en_US: Local Agent
    zh_Hans: 本地 Agent
  description:
    en_US: Built-in agent with model fallback, tools, and knowledge retrieval.
    zh_Hans: 内置 Agent，支持模型 fallback、工具调用和知识库检索。
spec:
  protocol_version: "1"
  config:
    - name: model
      label:
        en_US: Model
        zh_Hans: 模型
      type: model-fallback-selector
      required: true
      default:
        primary: ''
        fallbacks: []
    - name: timeout
      label:
        en_US: Timeout
        zh_Hans: 执行超时
      type: integer
      required: false
      default: 300
    - name: prompt
      label:
        en_US: Prompt
        zh_Hans: 提示词
      type: prompt-editor
      required: true
      default:
        - role: system
          content: "You are a helpful assistant."
    - name: knowledge-bases
      label:
        en_US: Knowledge Bases
        zh_Hans: 知识库
      type: knowledge-base-multi-selector
      required: false
      default: []
    - name: retrieval-top-k
      label:
        en_US: Retrieval Top K
        zh_Hans: 知识库检索数量
      type: integer
      required: false
      default: 5
    - name: rerank-model
      label:
        en_US: Rerank Model
        zh_Hans: 重排序模型
      type: rerank-model-selector
      required: false
      default: ''
    - name: rerank-top-k
      label:
        en_US: Rerank Top K
        zh_Hans: 重排序保留数量
      type: integer
      required: false
      default: 5
    - name: max-tool-iterations
      label:
        en_US: Max Tool Iterations
        zh_Hans: 最大工具调用轮数
      type: integer
      required: false
      default: 10
    - name: max-tool-result-chars
      label:
        en_US: Max Tool Result Characters
        zh_Hans: 最大工具结果字符数
      type: integer
      required: false
      default: 20000
    - name: context-history-fetch-limit
      label:
        en_US: History Fetch Limit
        zh_Hans: 历史消息拉取数量
      type: integer
      required: false
      default: 50
    - name: context-window-tokens
      label:
        en_US: Context Window Tokens
        zh_Hans: 上下文窗口 Token 数
      type: integer
      required: false
      default: 200000
    - name: context-reserve-tokens
      label:
        en_US: Reserved Output Tokens
        zh_Hans: 输出保留 Token 数
      type: integer
      required: false
      default: 16384
    - name: context-keep-recent-tokens
      label:
        en_US: Recent Context Tokens
        zh_Hans: 最近上下文 Token 数
      type: integer
      required: false
      default: 20000
    - name: context-summary-tokens
      label:
        en_US: Summary Tokens
        zh_Hans: 摘要 Token 数
      type: integer
      required: false
      default: 8000
  capabilities:
    streaming: true
    tool_calling: true
    knowledge_retrieval: true
    multimodal_input: true
    skill_authoring: true
    skill_injection: true
    event_context: true
    platform_api: false
    interrupt: false
    stateful_session: true
  permissions:
    models: ["invoke", "stream"]
    tools: ["detail", "call"]
    knowledge_bases: ["list", "retrieve"]
    history: ["page", "search"]
    storage: ["plugin"]
    files: ["config", "knowledge"]
    platform_api: []
execution:
  python:
    path: default.py
    attr: DefaultAgentRunner
